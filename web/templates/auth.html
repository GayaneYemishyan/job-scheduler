{% extends "base.html" %}
{% block title %}FlowDesk | Sign In{% endblock %}
{% block content %}

<section class="auth-grid">
  <div class="panel">
    <p class="panel-label">Sign In</p>
    <h2 style="font-family:var(--font-head);font-size:1.4rem;margin-bottom:1rem">Welcome back</h2>
    <form method="post" action="{{ url_for('auth') }}" class="stack">
      <input type="hidden" name="mode" value="signin" />
      <label>Email</label>
      <input type="email" name="email" placeholder="you@example.com" required />
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" required minlength="6" />
      <button class="btn primary" type="submit" style="margin-top:0.5rem">Continue →</button>
    </form>
  </div>

  <div class="panel">
    <p class="panel-label">Create Account</p>
    <h2 style="font-family:var(--font-head);font-size:1.4rem;margin-bottom:1rem">Get started</h2>
    <form method="post" action="{{ url_for('auth') }}" class="stack">
      <input type="hidden" name="mode" value="signup" />
      <label>Full Name</label>
      <input type="text" name="full_name" placeholder="Your name" required minlength="2" />
      <label>Email</label>
      <input type="email" name="email" placeholder="you@example.com" required />
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" required minlength="6" />
      <button class="btn ghost" type="submit" style="margin-top:0.5rem">Create account →</button>
    </form>
  </div>
</section>

{% endblock %}
